<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reveal Sdk - Web Component</title>      

</head>

<body>
    <div id="revealView" style="height: 920px; width: 100%;"></div>

    <script type="module">
        import { RevealSdkSettings, RevealView, RVSqlServerDataSource, RVSqlServerDataSourceItem, RVMySqlDataSource, RVMySqlDataSourceItem, RevealDataSources } from "https://cdn.jsdelivr.net/npm/reveal-sdk@2.0.0-alpha.6/dist/reveal-sdk.esm.js";

        RevealSdkSettings.setBaseUrl("http://localhost:5111/");
        RevealSdkSettings.setAdditionalHeadersProvider(function (url) {
            const headers = {};
            //set the x-sales-person-id header that identifies the sales person
            headers["x-sales-person-id"] = "279";
            return headers;
        });

        var revealView = new RevealView("#revealView");
        revealView.startInEditMode = true;

        revealView.onDataSourcesRequested = (callback) => {
            const sqlServerDataSource = new RVSqlServerDataSource();
            sqlServerDataSource.id = "MySqlServerDataSource";
            sqlServerDataSource.title = "My SQL Server";

            const sqlServerDataSourceItem = new RVSqlServerDataSourceItem(sqlServerDataSource);
            sqlServerDataSourceItem.id = "MySqlServerDataSourceItem";
            sqlServerDataSourceItem.title = "John Orders";

            const mySqlDataSource = new RVMySqlDataSource();
            mySqlDataSource.id = "MyMySqlDataSource";
            mySqlDataSource.title = "My MySQL Server";

            const mySqlDataSourceItem = new RVMySqlDataSourceItem(mySqlDataSource);
            mySqlDataSourceItem.id = "MyMySqlDataSourceItem";
            mySqlDataSourceItem.title = "Jane Orders";

            callback(new RevealDataSources([sqlServerDataSource, mySqlDataSource], [sqlServerDataSourceItem, mySqlDataSourceItem], true));
        };
   </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reveal Sdk - Web Component</title>      

</head>

<body>
    <button data-format="pdf">Export as PDF</button>
    <button data-format="xlsx">Export as Excel</button>
    <button data-format="pptx">Export as Power Point</button>
    <div id="revealView" style="height: 920px; width: 100%;"></div>

    <script type="module">
        import { RevealSdkSettings, RVDashboard, RevealView } from "https://cdn.jsdelivr.net/npm/reveal-sdk@2.0.0-alpha.6/dist/reveal-sdk.esm.js";

        //set this to your server url
        RevealSdkSettings.setBaseUrl("http://localhost:5111/");

        RVDashboard.loadDashboard("Sales").then(dashboard => {
            var revealView = new RevealView("#revealView");
            revealView.dashboard = dashboard;
        });

        function downloadFile(blob, format) {
            var a = document.createElement("a");
            a.download = `Sales.${format}`;
            a.href = window.URL.createObjectURL(blob);
            a.click();
        }

        document.querySelectorAll("button[data-format]").forEach(button => {
            button.addEventListener("click", () => {
                const format = button.dataset.format;
                fetch(`http://localhost:5111/dashboards/export/Sales?format=${format}`)
                    .then(resp => resp.blob())
                    .then(blob => downloadFile(blob, format));
            });
        });
    </script>
</body>

</html>

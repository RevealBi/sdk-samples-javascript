<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reveal Sdk - Web Component</title>
    

    <style>
        .container {
            display: flex;
        }
        
        .menu    {
            width: 100px;
        }
        
        .revealView  {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="menu">
            <button id="japanFilterBtn">Set Japan Filter</button>
            <button id="multipleFiltersBtn">Set Multiple Filters</button>
            <button id="listValuesBtn">List Territory Filter Values</button>
            <select id="filterValues" size="10" style="width: 100px;">
            </select>
            <button id="clearFilterBtn">Clear Territory Filter</button>
        </div>

        <div id="revealView" class="revealView"></div>
    </div>

    <script type="module">
        import { RevealSdkSettings, RVDashboard, RevealView } from "https://cdn.jsdelivr.net/npm/reveal-sdk@2.0.0-alpha.6/dist/reveal-sdk.esm.js";

        //set this to your server url
        RevealSdkSettings.setBaseUrl("https://samples.revealbi.io/upmedia-backend/reveal-api/");

        let revealView;
        let territoryFilterValues = [];

        RVDashboard.loadDashboard("Sales").then(dashboard => {
            revealView = new RevealView("#revealView");
            revealView.dashboard = dashboard;
        });

        const getTerritoryFilter = () => revealView.dashboard.filters.getByTitle("Territory");

        document.getElementById("japanFilterBtn").addEventListener("click", () => {
            getTerritoryFilter().selectedValues = ["Japan"];
        });

        document.getElementById("multipleFiltersBtn").addEventListener("click", () => {
            getTerritoryFilter().selectedValues = ["Japan", "India"];
        });

        document.getElementById("listValuesBtn").addEventListener("click", () => {
            getTerritoryFilter().getFilterValues(filterValues => {
                territoryFilterValues = filterValues;
                const options = territoryFilterValues.map(filterValue => `<option value="${filterValue.label}">${filterValue.label}</option>`).join('\n');
                document.getElementById("filterValues").innerHTML = options;
            });
        });

        document.getElementById("filterValues").addEventListener("change", (event) => {
            const filterValue = territoryFilterValues.find(x => x.label === event.target.value);
            getTerritoryFilter().selectedValues = [filterValue.value];
        });

        document.getElementById("clearFilterBtn").addEventListener("click", () => {
            getTerritoryFilter().selectedValues = [];
        });
    </script>
</body>

</html>

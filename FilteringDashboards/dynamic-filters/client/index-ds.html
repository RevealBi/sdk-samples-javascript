<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reveal Sdk - Data Sources</title>
    <link rel="stylesheet" href="styles/common.css">
    <style>
        /* Override for this specific page since it doesn't have controls */
        #viewer {
            height: 100vh;
            width: 100%;
        }
    </style>
</head>

<body>
    <div id="viewer"></div>    
    <script type="module">
        import { RevealSdkSettings, RevealView, RVPostgresDataSource, RevealDataSources } from "https://cdn.jsdelivr.net/npm/reveal-sdk@2.0.0-alpha.6/dist/reveal-sdk.esm.js";

        RevealSdkSettings.setBaseUrl("http://localhost:5111/");
        var revealView = new RevealView("#viewer");
        revealView.startInEditMode = true;

        revealView.onDataSourcesRequested = (callback) => {
            var sqlServerDataSource = new RVPostgresDataSource();
            sqlServerDataSource.id="sqlServer1";
            sqlServerDataSource.title = "Northwind SQL Data";

            callback(new RevealDataSources([sqlServerDataSource],
                [], false));
           };
    </script>
</body>

</html>

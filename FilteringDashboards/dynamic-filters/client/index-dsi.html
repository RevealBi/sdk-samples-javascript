<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reveal Sdk - Dynamic Data Sources</title>
    <link rel="stylesheet" href="styles/common.css">
</head>

<body>
    <div class="dashboard-controls">
        <div class="control-group">          
            <div class="control-item">
                <label class="control-label" for="userId">User ID:</label>
                <div class="custom-select">
                    <select name="users" id="userId">
                        <option value="ALFKI">ALFKI</option>
                        <option value="ANATR">ANATR</option>
                        <option value="BLAUS">BLAUS</option>
                        <option value="BLONP">BLONP</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
    
    <div id="revealView"></div>
    <script type="module">
        import { RevealSdkSettings, RevealView, RVPostgresDataSource, RVPostgresDataSourceItem, RevealDataSources } from "https://cdn.jsdelivr.net/npm/reveal-sdk@2.0.0-alpha.6/dist/reveal-sdk.esm.js";

        RevealSdkSettings.setBaseUrl("http://localhost:5111/");
        RevealSdkSettings.enableActionsOnHoverTooltip = true;

        // Set up headers provider to include User ID
        RevealSdkSettings.setAdditionalHeadersProvider(function (url) {
            return headers;
        });

        const headers = {};

        var revealView = new RevealView("#revealView");
        revealView.interactiveFilteringEnabled = true;
        revealView.startInEditMode = true;
        revealView.onDataSourcesRequested = (callback) => {

            // Pass the selected User ID as a header to the server
            var selectedUserId = document.getElementById('userId').value;
            headers["x-header-one"] = `${selectedUserId}`;
            console.log(headers["x-header-one"]);

            var pgDs = new RVPostgresDataSource();
            pgDs.id="postgresServerDataSource";
            pgDs.title = "Postgres Data Source";

            var pgDsi = new RVPostgresDataSourceItem(pgDs);
            pgDsi.id="CustOrdersOrders";
            pgDsi.title = "Customer Orders Orders";
            pgDsi.subtitle = "Stored Procedure  (customerId)";

            //**********************************************
            // Note, this is the callback that loads everything above into the dialog.  If you don't want to show the entire
            // database, just remove pgDataSource from the array and leave it empty like this []
            callback(new RevealDataSources([], [pgDsi], false));
            };
    </script>
</body>

</html>

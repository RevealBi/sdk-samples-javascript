<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reveal Sdk - Web Component</title>      

</head>

<body>
    <div id="revealView" style="height: 920px; width: 100%;"></div>

    <script type="module">
        import { RevealSdkSettings, RevealView, RVPostgresDataSource, RVPostgresDataSourceItem, RevealDataSources } from "https://cdn.jsdelivr.net/npm/reveal-sdk@2.0.0-alpha.6/dist/reveal-sdk.esm.js";

        RevealSdkSettings.setBaseUrl("http://localhost:5111/");

        var revealView = new RevealView("#revealView");
        revealView.startInEditMode = true;

        revealView.onDataSourcesRequested = (callback) => {

            var postgresDataSource = new RVPostgresDataSource();
            postgresDataSource.id = "MyPostgresDataSource";
            postgresDataSource.title = "My PostgreSQL";

            var postgresDataSourceItem = new RVPostgresDataSourceItem(postgresDataSource);
            postgresDataSourceItem.id = "MyPostgresDataSourceItem";
            postgresDataSourceItem.title = "My PostgreSQL Item";

            callback(new RevealDataSources([postgresDataSource], [postgresDataSourceItem], true));
        };
   </script>
</body>

</html>

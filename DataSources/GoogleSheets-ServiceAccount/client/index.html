<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reveal Sdk - Web Component</title>      

</head>

<body>
    <div id="revealView" style="height: 920px; width: 100%;"></div>

    <script type="module">
        import { RevealSdkSettings, RevealView, RVGoogleDriveDataSourceItem, RVGoogleSheetDataSourceItem, RevealDataSources } from "https://cdn.jsdelivr.net/npm/reveal-sdk@2.0.0-alpha.6/dist/reveal-sdk.esm.js";

        RevealSdkSettings.setBaseUrl("http://localhost:5111/");

        var revealView = new RevealView("#revealView");
        revealView.startInEditMode = true;

        revealView.onDataSourcesRequested = (callback) => {

            //get file from google drive
            const googleDriveDSI = new RVGoogleDriveDataSourceItem();
            googleDriveDSI.identifier = "file_identifier";

            //indicate the file is a google sheet and set the sheet name
            const googleSheet  = new RVGoogleSheetDataSourceItem(googleDriveDSI);
            googleDriveDSI.title = "My Google Sheet";
            googleSheet.subtitle = "Google Drive";
            googleSheet.sheet = "Sheet1";

            callback(new RevealDataSources([], [googleSheet], false));
        };
   </script>
</body>

</html>

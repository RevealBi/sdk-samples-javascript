<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reveal Sdk - Web Component</title>      

</head>

<body>
    <div id="revealView" style="height: 920px; width: 100%;"></div>

    <script type="module">
        import { RevealSdkSettings, RevealView, RVAthenaDataSource, RVAthenaDataSourceItem, RevealDataSources } from "https://cdn.jsdelivr.net/npm/reveal-sdk@2.0.0-alpha.6/dist/reveal-sdk.esm.js";

        RevealSdkSettings.setBaseUrl("http://localhost:5111/");

        var revealView = new RevealView("#revealView");
        revealView.startInEditMode = true;

        revealView.onDataSourcesRequested = (callback) => {

            var dataSource = new RVAthenaDataSource();
            dataSource.title = "My Athena Data Source";
            dataSource.subtitle = "Amazon Athena";

            var dataSourceItem = new RVAthenaDataSourceItem(dataSource);
            dataSourceItem.id = "my-data-source-item";
            dataSourceItem.title = "My Athena Data Source Item";
            dataSourceItem.subtitle = "Amazon Athena";

            callback(new RevealDataSources([dataSource], [dataSourceItem], false));
        };
   </script>
</body>

</html>

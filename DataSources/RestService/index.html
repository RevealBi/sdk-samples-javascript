<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reveal Sdk - Web Component</title>      

</head>

<body>
    <div id="revealView" style="height: 920px; width: 100%;"></div>

    <script type="module">
        import { RevealSdkSettings, RevealView, RVRESTDataSource, RevealDataSources } from "https://cdn.jsdelivr.net/npm/reveal-sdk@2.0.0-alpha.6/dist/reveal-sdk.esm.js";

        RevealSdkSettings.setBaseUrl("https://samples.revealbi.io/upmedia-backend/reveal-api/");

        var revealView = new RevealView("#revealView");
        revealView.startInEditMode = true;

        revealView.onDataSourcesRequested = (callback) => {

            const restDataSource = new RVRESTDataSource();
            restDataSource.url = "https://excel2json.io/api/share/6e0f06b3-72d3-4fec-7984-08da43f56bb9";
            restDataSource.title = "Sales by Category";
            restDataSource.subtitle = "Excel2Json";
            restDataSource.useAnonymousAuthentication = true;

            callback(new RevealDataSources([restDataSource], [], true));
        };
   </script>
</body>

</html>

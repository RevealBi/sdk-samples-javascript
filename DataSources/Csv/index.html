<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reveal Sdk - Web Component</title>
    
</head>

<body>
    <div id="revealView" style="height: 920px; width: 100%;"></div>

    <script type="module">
        import { RevealSdkSettings, RevealView, RVWebResourceDataSource, RVWebResourceDataSourceItem, RVCsvDataSourceItem, RevealDataSources } from "https://cdn.jsdelivr.net/npm/reveal-sdk@2.0.0-alpha.6/dist/reveal-sdk.esm.js";

        RevealSdkSettings.setBaseUrl("https://samples.revealbi.io/upmedia-backend/reveal-api/");

        var revealView = new RevealView("#revealView");
        revealView.startInEditMode = true;

        revealView.onDataSourcesRequested = (callback) => {

            const webDS = new RVWebResourceDataSource();
            webDS.title = "Web Data Source";
            webDS.subtitle = "Web Data Source Subtitle";
            webDS.url = "https://raw.githubusercontent.com/fivethirtyeight/data/master/airline-safety/airline-safety.csv";
            webDS.useAnonymousAuthentication = true;

            //to skip the "Set up your CSV" dialog and directly use the CSV data
            const webDSI = new RVWebResourceDataSourceItem(webDS);
            const csvDSI = new RVCsvDataSourceItem(webDSI);
            csvDSI.title = "CSV Data";
            csvDSI.subtitle = "CSV Data Subtitle";

            callback(new RevealDataSources([webDS], [csvDSI], false));
        };
    </script>
</body>

</html>

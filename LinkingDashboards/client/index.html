<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reveal Sdk - Web Component</title>
    

    <style>
        .revealView {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="revealView" class="revealView"></div>

    <script type="module">
        import { RevealSdkSettings, RVDashboard, RevealView } from "https://cdn.jsdelivr.net/npm/reveal-sdk@2.0.0-alpha.6/dist/reveal-sdk.esm.js";

        //set this to your server url
        RevealSdkSettings.setBaseUrl("http://localhost:5111/");

        RVDashboard.loadDashboard("Marketing").then(dashboard => {
            revealView = new RevealView("#revealView");
            revealView.dashboard = dashboard;

            revealView.onLinkedDashboardProviderAsync = function (dashboardId, title) {
                return RVDashboard.loadDashboard(title);
            };
        });

    </script>
</body>

</html>

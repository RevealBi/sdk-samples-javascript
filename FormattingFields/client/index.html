<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reveal Sdk - Web Component</title>
    
    <link href="style.css" rel="stylesheet" type="text/css">
</head>

<body>
    <div class="navbar">
        <div class="dropdown">
            <button class="dropbtn">Location
                <i class="fa fa-caret-down"></i>
            </button>
            <div class="dropdown-content" id="locationMenu">
                <a href="#" data-lang="En" data-country="US" data-currency="USD">United States</a>
                <a href="#" data-lang="Ja" data-country="JP" data-currency="JPY">Japan</a>
                <a href="#" data-lang="Es" data-country="ES" data-currency="EUR">Spain</a>
            </div>
        </div>
    </div>
    <div id="revealView" class="revealView"></div>

    <script type="module">
        import { RevealSdkSettings, RVDashboard, RevealView, SupportedLocales, RVDashboardDataType, RVNumberFormattingSpec, RVDashboardNumberFormattingType, RVDateFormattingSpec, RVDashboardDateAggregationType } from "https://cdn.jsdelivr.net/npm/reveal-sdk@2.0.0-alpha.6/dist/reveal-sdk.esm.js";

        document.body.style.margin = "0px";
        document.body.style.display = "block";

        var worldMoneySymbols = {
            "JPY": "¥",
            "USD": "$",
            "EUR": "€"
        };

        document.getElementById('locationMenu').addEventListener('click', (event) => {
            const target = event.target.closest('[data-lang]');
            if (!target) return;
            event.preventDefault();
            sessionStorage.setItem('langCode', target.dataset.lang);
            sessionStorage.setItem('countryCode', target.dataset.country);
            sessionStorage.setItem('currencyCode', worldMoneySymbols[target.dataset.currency]);
            location.reload();
        });

        var locationSelected = {
            "langCode": sessionStorage.getItem('langCode'),
            "currencyCode": sessionStorage.getItem('currencyCode'),
            "countryCode": sessionStorage.getItem('countryCode')
        };

        (async () => {
            // this line changes the static texts in the UI
            if (locationSelected.langCode !== null) {
                await RevealSdkSettings.overrideLocale(SupportedLocales[locationSelected.langCode]);
            }

            //set this to your server url
            RevealSdkSettings.setBaseUrl("http://localhost:5111/");

            RevealSdkSettings.fieldFormattingSettingsProvider = function (desc, context) {

                var settings;
                var selectedLang = locationSelected.langCode !== null ? locationSelected.langCode.toLowerCase() : navigator.language.split("-")[0];
                var selectedCurrency = locationSelected.currencyCode !== null ? locationSelected.currencyCode : "USD";
                var locale = selectedLang + "-" + locationSelected.countryCode;

                if (desc.dataType === RVDashboardDataType.Number) {

                    settings = new RVNumberFormattingSpec();

                    if (desc.fieldName == "UnitPrice" || desc.fieldName == "OrderID" || desc.fieldName == "Subtotal") {
                        settings.decimalDigits = 3;
                        settings.applyMkFormat = true;
                        settings.formatType = RVDashboardNumberFormattingType.Currency;
                        settings.showGroupingSeparator = true;
                        settings.currencySymbol = selectedCurrency;
                    }

                    if (desc.fieldName == "UnitsInStock") {
                        settings.decimalDigits = 0;
                        settings.applyMkFormat = true;
                        settings.formatType = RVDashboardNumberFormattingType.Number;
                        settings.showGroupingSeparator = true;
                    }

                    if (desc.fieldName == "UnitsOnOrder") {
                        settings.decimalDigits = 1;
                        settings.applyMkFormat = true;
                        settings.formatType = RVDashboardNumberFormattingType.Number;
                        settings.showGroupingSeparator = true;
                    }

                    if (desc.fieldName == "CategoryID") {
                        settings.decimalDigits = 1;
                        settings.applyMkFormat = true;
                        settings.formatType = RVDashboardNumberFormattingType.Currency;
                        settings.showGroupingSeparator = true;
                        settings.currencySymbol = selectedCurrency;
                    }
                }

                if (desc.dataType === RVDashboardDataType.Date || desc.dataType === RVDashboardDataType.DateTime) {

                    settings = new RVDateFormattingSpec();
                    settings.locale = locale;

                    if (desc.dateAggregationType === RVDashboardDateAggregationType.Year)
                        settings.dateFormat = worldDateFormat[selectedLang] ? worldDateFormat[selectedLang] : worldDateFormat.Default;

                    if (desc.dateAggregationType === RVDashboardDateAggregationType.Month)
                        settings.dateFormat = "MMM-yy"
                }
                return settings;

            };

            RVDashboard.loadDashboard("VisualizationsLoc").then(dashboard => {
                var revealView = new RevealView("#revealView");
                revealView.dashboard = dashboard;
            });

        })();

        var worldDateFormat =
        {
            "Default": "dd'-'MMMM'-'yyyy",
            "zh": "yyyy'/'MM'/'dd",
            "ja": "yyyy'/'MM'/'dd",
            "ko": "yyyy'/'MM'/'dd",
            "fa": "yyyy'/'MM'/'dd",
            "en": "MM'/'dd'/'yyyy"
        }
    </script>
</body>

</html>

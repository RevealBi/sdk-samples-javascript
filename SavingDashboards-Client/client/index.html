<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reveal Sdk - Web Component</title>
    

    <style>
        .revealView {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="revealView" class="revealView"></div>

    <script type="module">
        import { RevealSdkSettings, RVDashboard, RevealView } from "https://cdn.jsdelivr.net/npm/reveal-sdk@2.0.0-alpha.6/dist/reveal-sdk.esm.js";

        //set this to your server url
        RevealSdkSettings.setBaseUrl("http://localhost:5111/");

        RVDashboard.loadDashboard("Sales").then(dashboard => {
            var revealView = new RevealView("#revealView");
            revealView.serverSideSave = false;
            revealView.dashboard = dashboard;

            revealView.onSave = (rv, args) => {
                if (args.saveAs) {
                    var newName = prompt("Please enter the dashboard name");
                    isDuplicateName(newName).then(isDuplicate => {
                        if (isDuplicate === "true") {
                            if (!window.confirm("A dashboard with name: " + newName + " already exists. Do you want to override it?")) {
                                args.saveFinished();
                                return;
                            }
                        }

                        args.dashboardId = args.name = newName;
                        args.serializeWithNewName(newName, bytes => {
                            this.saveDashboard(newName, bytes, true).then(() => {
                                args.saveFinished();
                            });
                        });
                    });
                }
                else {
                    args.serialize(bytes => {
                        this.saveDashboard(args.name, bytes).then(() => {
                            args.saveFinished();
                        });
                    });
                }
            };
        });

        function isDuplicateName(name) {
            return fetch(`http://localhost:5111/isduplicatename/${name}`).then(resp => resp.text());
        }

        function saveDashboard(name, bytes, isSaveAs = false) {

            let url = `http://localhost:5111/dashboards/${name}`;
            let params = {
                body: bytes,
                method: "PUT"
            }

            if (isSaveAs) {
                params.method = "POST"
            }

            return fetch(url, params);
        }

    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reveal Sdk - Web Component</title>
    

    <style>
        .container {
            display: flex;
        }

        .menu {
            width: 100px;
        }

        .revealView {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="menu">
            <button id="allTimeBtn">All Time</button>
            <button id="todayBtn">Today</button>
            <button id="lastYearBtn">Last Year</button>
            <button id="rangeBtn">Range</button>
        </div>

        <div id="revealView" class="revealView"></div>
    </div>

    <script type="module">
        import { RevealSdkSettings, RVDashboard, RevealView, RVDateDashboardFilter, RVDateFilterType, RVDateRange } from "https://cdn.jsdelivr.net/npm/reveal-sdk@2.0.0-alpha.6/dist/reveal-sdk.esm.js";

        //set this to your server url
        RevealSdkSettings.setBaseUrl("https://samples.revealbi.io/upmedia-backend/reveal-api/");

        let revealView;

        RVDashboard.loadDashboard("Sales").then(dashboard => {
            revealView = new RevealView("#revealView");
            revealView.dashboard = dashboard;
        });

        document.getElementById("allTimeBtn").addEventListener("click", () => {
            revealView.dashboard.dateFilter = new RVDateDashboardFilter(RVDateFilterType.AllTime);
        });

        document.getElementById("todayBtn").addEventListener("click", () => {
            revealView.dashboard.dateFilter = new RVDateDashboardFilter(RVDateFilterType.Today);
        });

        document.getElementById("lastYearBtn").addEventListener("click", () => {
            revealView.dashboard.dateFilter = new RVDateDashboardFilter(RVDateFilterType.LastYear);
        });

        document.getElementById("rangeBtn").addEventListener("click", () => {
            var fromDate = new Date();
            fromDate.setDate(fromDate.getDate() - 100);

            var dateRange = new RVDateRange(fromDate, new Date);
            revealView.dashboard.dateFilter = new RVDateDashboardFilter(RVDateFilterType.CustomRange, dateRange);
        });
    </script>
</body>

</html>

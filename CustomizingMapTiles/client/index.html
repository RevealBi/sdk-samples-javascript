<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reveal Sdk - Web Component</title>
</head>

<body>
<div id="revealView" style="height: 920px; width: 100%;"></div>

<script type="module">
    import { RevealSdkSettings, RVDashboard, RevealView, ScatterMapVisualizationsConfiguration, RVLocalFileDataSourceItem, RVCsvDataSourceItem, RevealDataSources } from "https://cdn.jsdelivr.net/npm/reveal-sdk@2.0.0-alpha.6/dist/reveal-sdk.esm.js";

    // set this to your server url
    RevealSdkSettings.setBaseUrl("http://localhost:5111/");

    //Using OpenStreetMaps
    const url = 'https://tile.openstreetmap.org/{Z}/{X}/{Y}.png'
    RevealSdkSettings.visualizations.scatterMaps = ScatterMapVisualizationsConfiguration.createOpenStreetMapConfiguration(url);

    //Using Bing
    //RevealSdkSettings.visualizations.scatterMaps = new ScatterMapVisualizationsConfiguration("Bing", "your-key");

    //Using Esri
    //RevealSdkSettings.visualizations.scatterMaps = new ScatterMapVisualizationsConfiguration("Esri", "your-token");

    //Using MapBox
    //RevealSdkSettings.visualizations.scatterMaps = new ScatterMapVisualizationsConfiguration("MapBox", "your-token");

    RVDashboard.loadDashboard("Traffic Volume", (dashboard) => {
        const revealView = new RevealView("#revealView");
        revealView.dashboard = dashboard;

        revealView.onDataSourcesRequested = (callback) => {
            const localFileItem = new RVLocalFileDataSourceItem();
            localFileItem.uri = "local:/Traffic_Volume.csv";

            const csvDataSourceItem = new RVCsvDataSourceItem(localFileItem);
            csvDataSourceItem.title = "CSV Data";
            csvDataSourceItem.subtitle = "CSV Data Subtitle";

            callback(new RevealDataSources([], [csvDataSourceItem], true));
        };
    });
</script>
</body>

</html>

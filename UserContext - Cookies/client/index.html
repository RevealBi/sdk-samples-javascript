<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reveal Sdk - Web Component</title>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
        }

        #revealView {
            height: 100%;
        }
    </style>

</head>

<body>
    <div id="revealView"></div>

    <script type="module">
        import { RevealSdkSettings, RVDashboard, RevealView } from "https://cdn.jsdelivr.net/npm/reveal-sdk@2.0.0-alpha.6/dist/reveal-sdk.esm.js";

        //set this to your server url
        RevealSdkSettings.setBaseUrl("http://localhost:5111/");
        //set this property to pass the credentials (cookies) from the browser to the reveal server
        RevealSdkSettings.requestWithCredentialsFlag = true;

        async function initialize() {
            //simiulate login which generates a cookie on the server
            await fetch("http://localhost:5111/api/login", {
                credentials: "include" // This is necessary for cookies to be sent and received
            });

            RVDashboard.loadDashboard("Sales", (dashboard) => {
                var revealView = new RevealView("#revealView");
                revealView.dashboard = dashboard;
            });
        }

        initialize();
    </script>
</body>

</html>
